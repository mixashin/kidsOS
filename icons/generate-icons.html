<!DOCTYPE html>
<html>
<head><title>Generate KidsOS Icons</title></head>
<body>
<h2>KidsOS Icon Generator — Mobile (PWA) Icons</h2>
<p>Right-click each icon and "Save image as..." to save the PNG files into this <code>icons/</code> folder.</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.1875; // corner radius

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0f3460');

  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0); ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r); ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s); ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  const cx = s / 2;

  // Helper: draw a rounded rect path
  function roundRect(x, y, w, h, rad) {
    ctx.beginPath();
    ctx.moveTo(x + rad, y);
    ctx.lineTo(x + w - rad, y); ctx.quadraticCurveTo(x + w, y, x + w, y + rad);
    ctx.lineTo(x + w, y + h - rad); ctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    ctx.lineTo(x + rad, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - rad);
    ctx.lineTo(x, y + rad); ctx.quadraticCurveTo(x, y, x + rad, y);
    ctx.closePath();
  }

  // ---- Launcher-style layout (like a real home screen) ----
  const pad = s * 0.06;          // outer padding
  const cols = 4;

  // App icon definitions — matching actual KidsOS apps
  const apps = [
    { color: '#4fc3f7', emoji: '\u{1F4C1}', label: 'Files'   },
    { color: '#81c784', emoji: '\u{1F4DD}', label: 'Notepad'  },
    { color: '#ffb74d', emoji: '\u{1F5A9}', label: 'Calc'     },
    { color: '#e57373', emoji: '\u{1F3A8}', label: 'Paint'    },
    { color: '#ba68c8', emoji: '\u{1F40D}', label: 'Snake'    },
    { color: '#4db6ac', emoji: '\u{1F0CF}', label: 'Memory'   },
    { color: '#f48fb1', emoji: '\u{1F4F7}', label: 'Kdstgrm'  },
    { color: '#7986cb', emoji: '\u{1F4AC}', label: 'Chat'     },
    { color: '#ff8a65', emoji: '\u{1F4A3}', label: 'Mines'    },
    { color: '#aed581', emoji: '\u{2699}',  label: 'Settings' },
    { color: '#fff176', emoji: '\u{1F4E7}', label: 'eJob'     },
    { color: '#80deea', emoji: '\u{2B50}',  label: 'More'     },
  ];

  // Grid area: top portion for 3 rows of 4 icons
  const gridRows = 3;
  const gridTop = pad + s * 0.02;
  const gridW = s - pad * 2;
  const cellW = gridW / cols;
  const iconSize = cellW * 0.6;
  const iconRad = iconSize * 0.22;  // rounded-square radius
  const cellH = s * 0.22;

  // Draw main grid (3 rows x 4 cols)
  for (let i = 0; i < apps.length; i++) {
    const row = Math.floor(i / cols);
    const col = i % cols;
    const app = apps[i];

    const icx = pad + cellW * col + cellW / 2;
    const icy = gridTop + cellH * row + cellH * 0.38;

    // Rounded-square icon background
    roundRect(icx - iconSize / 2, icy - iconSize / 2, iconSize, iconSize, iconRad);
    ctx.fillStyle = app.color;
    ctx.fill();

    // Emoji
    ctx.fillStyle = 'white';
    ctx.font = `${iconSize * 0.52}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(app.emoji, icx, icy + iconSize * 0.03);

    // Label below icon
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = `600 ${s * 0.028}px system-ui, sans-serif`;
    ctx.textBaseline = 'top';
    ctx.fillText(app.label, icx, icy + iconSize / 2 + s * 0.01);
  }

  // ---- Dock at bottom (like iOS dock) ----
  const dockH = s * 0.18;
  const dockY = s - pad - dockH;

  // Dock background (frosted glass effect)
  roundRect(pad * 0.8, dockY, s - pad * 1.6, dockH, s * 0.04);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fill();

  // Page dots above dock
  const dotsY = dockY - s * 0.025;
  const dotR = s * 0.005;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(cx + (i - 1) * s * 0.025, dotsY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.25)';
    ctx.fill();
  }

  // Dock icons (4 most-used apps)
  const dockApps = [
    { color: '#4fc3f7', emoji: '\u{1F4C1}' },
    { color: '#e57373', emoji: '\u{1F3A8}' },
    { color: '#f48fb1', emoji: '\u{1F4F7}' },
    { color: '#7986cb', emoji: '\u{1F4AC}' },
  ];
  const dockCellW = (s - pad * 2) / 4;
  const dockIconSize = iconSize * 0.9;
  const dockIconRad = dockIconSize * 0.22;
  const dockIconY = dockY + dockH / 2;

  for (let i = 0; i < dockApps.length; i++) {
    const app = dockApps[i];
    const dx = pad + dockCellW * i + dockCellW / 2;

    roundRect(dx - dockIconSize / 2, dockIconY - dockIconSize / 2, dockIconSize, dockIconSize, dockIconRad);
    ctx.fillStyle = app.color;
    ctx.fill();

    ctx.fillStyle = 'white';
    ctx.font = `${dockIconSize * 0.52}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(app.emoji, dx, dockIconY + dockIconSize * 0.03);
  }

  // ---- "KidsOS" small label at top (like a status bar brand) ----
  ctx.fillStyle = '#5b8cff';
  ctx.font = `700 ${s * 0.05}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('KidsOS', cx, s * 0.015);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Auto-download both
['c192','c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const a = document.createElement('a');
  a.download = `icon-${canvas.width}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
